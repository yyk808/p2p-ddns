name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-verify

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Run non-Docker tests
        run: >
          cargo test --
          --skip docker_p2p_smoke
          --skip docker_p2p_matrix
          --skip docker_p2p_expected_failures

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    needs: verify
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            build_deb: true
            deb_arch: amd64
          - label: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            build_deb: true
            deb_arch: arm64
          - label: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            build_deb: false
            deb_arch: ""
          - label: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            build_deb: false
            deb_arch: ""
          - label: windows-x86_64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            build_deb: false
            deb_arch: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build binaries
        run: cargo build --locked --release --bins --target ${{ matrix.target }}

      - name: Build archive
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: bash scripts/package_release.sh

      - name: Build Debian package
        if: matrix.build_deb
        env:
          TARGET: ${{ matrix.target }}
          DEB_ARCH: ${{ matrix.deb_arch }}
          DEB_VERSION: ${{ github.ref_name }}
          BUILDER: cargo
        run: bash scripts/build_deb.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            dist/release/*
            dist/deb/*.deb
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/release-assets
          merge-multiple: true

      - name: Create checksums
        working-directory: dist/release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/release-assets/*
          fail_on_unmatched_files: true
